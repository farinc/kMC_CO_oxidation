[project]
name = "co-oxidation"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "me-mkm",
    "numba>=0.66.0",
    "numpy>=2.4.6",
    "pandas>=3.0.3",
    "scipy>=1.18.0",
]

[project.optional-dependencies]
mpi = [
    "mpi4py>=4.1.2 ; sys_platform == 'linux'",
    "petsc4py ; sys_platform == 'linux'",
]
plot = [
    "matplotlib>=3.10",
    "seaborn>=0.13.2",
]

[dependency-groups]
dev = [
    "co-oxidation[plot]",
    "notebook>=7.6.0",
    "pandas>=3.0.3",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "scipy>=1.18.0",
]

[project.scripts]
kmc-run = "co_oxidation.cli:main"
co-oxidation-plot = "co_oxidation.plotting:main"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/co_oxidation"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.uv.sources]
me-mkm = { git = "https://github.com/farinc/me-mkm-tiling.git" }
