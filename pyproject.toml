[project]
name = "kmc-co-oxidation"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "numba>=0.66.0",
    "numpy>=2.4.6",
    "pandas>=3.0.3",
    "scipy>=1.18.0",
]

[project.optional-dependencies]
mpi = [
    "mpi4py>=4.1.2 ; sys_platform == 'linux'",
]

[dependency-groups]
dev = [
    "notebook>=7.6.0",
    "pandas>=3.0.3",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "scipy>=1.18.0",
    "seaborn>=0.13.2",
]

[project.scripts]
kmc-run = "kmc_co_oxidation.cli:main"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kmc_co_oxidation"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
